# yaml-language-server: $schema=https://instadeep.aichor.ai/schema/latest/manifest.schema.json

kind: AIchorManifest
apiVersion: 0.2.2

builder:
  image: image
  context: smoke-test # smoke-test folder
  dockerfile: ./build/ray.Dockerfile # need ray installed

spec:
  operator: kuberay
  image: image
  command: "python3 -u main.py --operator=kuberay --sleep=300 --tb-write=True"
  storage:
   attachExistingPVCs:
    - name: mchennoufi-d-f794a1405d924441-kyber-pvc-440343be21ec4a43
      mountPoint: /mnt/mchennoufi-d-f794a1405d924441-kyber-pvc-440343be21ec4a43

  debug:
    jupyter: false

  tensorboard:
    enabled: true

  types:
    Head:
      resources:
        cpus: 1
        ramRatio: 2

    Workers:
      - name: cpu-workers
        count: 1
        resources:
          cpus: 1
          ramRatio: 2
          shmSizeGB: 0
